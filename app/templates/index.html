<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant Disease Detector</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f1b0f;
            color: #e0ffe0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: #1a2e1a;
            border: 1px solid #2d5a2d;
            border-radius: 16px;
            padding: 40px;
            width: 500px;
            text-align: center;
        }
        h1 { color: #5dbb5d; margin-bottom: 8px; font-size: 1.8rem; }
        p.sub { color: #7a9e7a; margin-bottom: 30px; font-size: 0.9rem; }
        .upload-zone {
            border: 2px dashed #2d5a2d;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .upload-zone:hover { border-color: #5dbb5d; }
        .upload-zone input { display: none; }
        .upload-zone label {
            cursor: pointer;
            color: #5dbb5d;
            font-size: 1rem;
        }
        #preview {
            max-width: 100%;
            max-height: 200px;
            border-radius: 8px;
            margin: 15px auto;
            display: none;
        }
        button {
            background: #5dbb5d;
            color: #0f1b0f;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }
        button:hover { background: #4da84d; }
        button:disabled { background: #2d5a2d; cursor: not-allowed; }
        #result {
            margin-top: 25px;
            display: none;
            text-align: left;
        }
        .result-card {
            background: #0f1b0f;
            border: 1px solid #2d5a2d;
            border-radius: 10px;
            padding: 20px;
        }
        .main-pred {
            font-size: 1.2rem;
            font-weight: bold;
            color: #5dbb5d;
            margin-bottom: 5px;
        }
        .confidence { color: #7a9e7a; margin-bottom: 15px; }
        .top3-title { font-size: 0.85rem; color: #7a9e7a; margin-bottom: 8px; }
        .bar-item { margin-bottom: 8px; }
        .bar-label { font-size: 0.8rem; color: #b0d4b0; margin-bottom: 3px; }
        .bar-bg { background: #1a2e1a; border-radius: 4px; height: 8px; }
        .bar-fill { background: #5dbb5d; height: 8px; border-radius: 4px; transition: width 0.5s; }
        #error { color: #ff6b6b; margin-top: 15px; display: none; }
        .spinner { display: none; margin: 10px auto; }
    </style>
</head>
<body>
<div class="container">
    <h1>🌿 Plant Disease Detector</h1>
    <p class="sub">Upload a leaf image to detect disease</p>

    <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
        <input type="file" id="fileInput" accept="image/*" onchange="previewImage(event)">
        <label>📁 Click to upload leaf image</label>
        <img id="preview" alt="preview">
    </div>

    <button id="predictBtn" onclick="predict()" disabled>Detect Disease</button>
    <div id="error"></div>

    <div id="result">
        <div class="result-card">
            <div class="main-pred" id="mainPred"></div>
            <div class="confidence" id="confText"></div>
            <div class="top3-title">Top 3 predictions:</div>
            <div id="top3Bars"></div>
        </div>
    </div>
</div>

<script>
    let selectedFile = null;

    function previewImage(event) {
        selectedFile = event.target.files[0];
        if (!selectedFile) return;
        const preview = document.getElementById('preview');
        preview.src = URL.createObjectURL(selectedFile);
        preview.style.display = 'block';
        document.getElementById('predictBtn').disabled = false;
        document.getElementById('result').style.display = 'none';
        document.getElementById('error').style.display = 'none';
    }

    async function predict() {
        if (!selectedFile) return;

        const btn = document.getElementById('predictBtn');
        btn.disabled = true;
        btn.textContent = 'Detecting...';

        const formData = new FormData();
        formData.append('file', selectedFile);

        try {
            const res = await fetch('/predict', { method: 'POST', body: formData });
            const data = await res.json();

            if (data.error) throw new Error(data.error);

            document.getElementById('mainPred').textContent = data.prediction.replace(/_/g, ' ');
            document.getElementById('confText').textContent = `Confidence: ${data.confidence}%`;

            const top3div = document.getElementById('top3Bars');
            top3div.innerHTML = '';
            data.top3.forEach(item => {
                const pct = (item.confidence * 100).toFixed(1);
                top3div.innerHTML += `
                    <div class="bar-item">
                        <div class="bar-label">${item.class.replace(/_/g, ' ')} — ${pct}%</div>
                        <div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div>
                    </div>`;
            });

            document.getElementById('result').style.display = 'block';
        } catch (err) {
            const errDiv = document.getElementById('error');
            errDiv.textContent = 'Error: ' + err.message;
            errDiv.style.display = 'block';
        } finally {
            btn.disabled = false;
            btn.textContent = 'Detect Disease';
        }
    }
</script>
</body>
</html>
